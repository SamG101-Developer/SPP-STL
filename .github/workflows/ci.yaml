name: Claude PR Review
on:
  pull_request:
    types: [ opened, edited, reopened, synchronize ]
permissions:
  contents: read
  issues: read
  pull-requests: write
  id-token: write
  actions: read
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
